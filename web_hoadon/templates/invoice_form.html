{% extends "base.html" %}
{% block title %}Tao Hoa Don{% endblock %}
{% block extra_js %}
<script>
let itemCount = 0;

function addItem() {
    itemCount++;
    const html = `<tr class="item-row">
        <td><input type="text" class="form-control" name="item_name_${itemCount}" placeholder="Ten hang"></td>
        <td><input type="number" class="form-control text-center" name="item_qty_${itemCount}" value="1" min="1" onchange="calculate()"></td>
        <td><input type="number" class="form-control text-end" name="item_price_${itemCount}" value="0" min="0" onchange="calculate()"></td>
        <td class="text-end item-total">0</td>
        <td><button type="button" class="btn btn-danger btn-sm" onclick="removeItem(this)"><i class="bi bi-trash"></i></button></td>
    </tr>`;
    document.getElementById('items-body').insertRow(-1).innerHTML = html;
}

function removeItem(btn) { btn.closest('tr').remove(); calculate(); }

function calculate() {
    let subtotal = 0;
    document.querySelectorAll('.item-row').forEach(row => {
        const qty = parseFloat(row.querySelector('input[name^="item_qty_"]').value) || 0;
        const price = parseFloat(row.querySelector('input[name^="item_price_"]').value) || 0;
        const total = qty * price;
        row.querySelector('.item-total').textContent = total.toLocaleString('vi-VN') + ' VND';
        subtotal += total;
    });
    const discount = parseFloat(document.getElementById('discount').value) || 0;
    const tax = parseFloat(document.getElementById('tax').value) || 0;
    const afterDiscount = subtotal * (1 - discount / 100);
    const total = afterDiscount * (1 + tax / 100);
    document.getElementById('subtotal').textContent = subtotal.toLocaleString('vi-VN') + ' VND';
    document.getElementById('total').textContent = total.toLocaleString('vi-VN') + ' VND';
    document.getElementById('subtotal_input').value = subtotal;
    document.getElementById('total_input').value = total;
    updateItemsData();
}

function updateItemsData() {
    const items = [];
    document.querySelectorAll('.item-row').forEach(row => {
        const name = row.querySelector('input[name^="item_name_"]').value;
        if (name) {
            items.push({
                name: name,
                quantity: parseFloat(row.querySelector('input[name^="item_qty_"]').value) || 0,
                price: parseFloat(row.querySelector('input[name^="item_price_"]').value) || 0,
                total: (parseFloat(row.querySelector('input[name^="item_qty_"]').value) || 0) * (parseFloat(row.querySelector('input[name^="item_price_"]').value) || 0)
            });
        }
    });
    document.getElementById('items_data').value = JSON.stringify(items);
}

function submitForm() { updateItemsData(); document.getElementById('invoice-form').submit(); }

function loadItems() {
    try {
        const items = {{ invoice.items|from_json|safe if invoice and invoice.items else '[]' }};
        items.forEach(item => {
            addItem();
            const rows = document.querySelectorAll('.item-row');
            const lastRow = rows[rows.length - 1];
            lastRow.querySelector('input[name^="item_name_"]').value = item.name || '';
            lastRow.querySelector('input[name^="item_qty_"]').value = item.quantity || 1;
            lastRow.querySelector('input[name^="item_price_"]').value = item.price || 0;
        });
        if (items.length > 0) calculate();
    } catch(e) {}
}
document.addEventListener('DOMContentLoaded', loadItems);
</script>
{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-file-earmark-text"></i> Tao Hoa Don</h2>
    <a href="{{ url_for('invoices') }}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Quay lai</a>
</div>

<form id="invoice-form" method="POST" enctype="multipart/form-data">
    <input type="hidden" name="items_data" id="items_data">
    <input type="hidden" name="subtotal" id="subtotal_input" value="0">
    <input type="hidden" name="total" id="total_input" value="0">

    <div class="row">
        <div class="col-md-4">
            <div class="card mb-4">
                <div class="card-header bg-white"><h5 class="mb-0">Thong Tin</h5></div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">So hoa don</label>
                        <input type="text" class="form-control" name="invoice_number" value="{{ invoice.invoice_number if invoice else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ngay</label>
                        <input type="date" class="form-control" name="invoice_date" value="{{ invoice.date if invoice else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cua hang</label>
                        <input type="text" class="form-control" name="store_name" value="{{ invoice.store_name if invoice else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ghi chu</label>
                        <textarea class="form-control" name="notes" rows="3">{{ invoice.notes if invoice else '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Anh hoa don</label>
                        <input type="file" class="form-control" name="invoice_image" accept="image/*">
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card mb-3">
                <div class="card-header bg-white d-flex justify-content-between">
                    <h5 class="mb-0">Danh Sach Hang Hoa</h5>
                    <button type="button" class="btn btn-primary btn-sm" onclick="addItem()"><i class="bi bi-plus"></i> Them</button>
                </div>
                <div class="card-body p-0">
                    <table class="table table-bordered mb-0">
                        <thead class="table-light">
                            <tr><th>Ten Hang</th><th width="100">So Luong</th><th width="150">Don Gia</th><th width="150">Thanh Tien</th><th width="60"></th></tr>
                        </thead>
                        <tbody id="items-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3"><label class="form-label">Giam gia (%)</label>
                                <input type="number" class="form-control" id="discount" name="discount_percent" value="{{ invoice.discount_percent if invoice else 0 }}" min="0" max="100" onchange="calculate()">
                            </div>
                            <div class="mb-3"><label class="form-label">Thue (%)</label>
                                <input type="number" class="form-control" id="tax" name="tax_percent" value="{{ invoice.tax_percent if invoice else 0 }}" min="0" max="100" onchange="calculate()">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-2"><div class="d-flex justify-content-between"><span>Tam tinh:</span><span id="subtotal">0 VND</span></div></div>
                            <hr>
                            <div class="d-flex justify-content-between"><strong>Tong cong:</strong><strong class="text-success fs-4" id="total">0 VND</strong></div>
                        </div>
                    </div>
                    <div class="text-end mt-3">
                        <button type="button" class="btn btn-success btn-lg" onclick="submitForm()"><i class="bi bi-check-circle"></i> Luu Hoa Don</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>
{% endblock %}
