{% extends "base.html" %}
{% block title %}Ket Qua Quet{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-check-circle"></i> Ket Qua Quet Anh</h2>
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Quay lai</a>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header bg-white"><h5 class="mb-0">Anh goc</h5></div>
            <div class="card-body text-center">
                {% if image_data %}
                <img src="data:image/jpeg;base64,{{ image_data }}" class="img-fluid rounded" style="max-height: 400px;">
                {% else %}
                <p class="text-muted">Khong co anh</p>
                {% endif %}
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header bg-white"><h5 class="mb-0">Text doc duoc tu anh</h5></div>
            <div class="card-body">
                <pre class="bg-light p-3 rounded" style="white-space: pre-wrap; max-height: 400px; overflow-y: auto;">{{ extracted_text }}</pre>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header bg-white"><h5 class="mb-0">Gui anh cho Admin</h5></div>
    <div class="card-body">
                <form method="POST" action="{{ url_for('send_to_admin', invoice_id=0) }}">
            <input type="hidden" name="image_data" value="{{ image_data }}">
            <div class="mb-3">
                <label class="form-label">Tin nhan cho Admin</label>
                <textarea class="form-control" name="message" rows="3" placeholder="VD: Kiem tra hoa don nay giup toi...">{{ extracted_text[:200] }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Gui cho Admin</button>
        </form>
    </div>
</div>
{% endblock %}
