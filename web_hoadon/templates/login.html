{% extends "base.html" %}

{% block title %}Đăng nhập - Hóa Đơn Manager{% endblock %}

{% block nav %}{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <i class="bi bi-receipt"></i>
            <h3>Hóa Đơn Manager</h3>
            <p class="text-muted">Đăng nhập để tiếp tục</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" name="username" required autofocus placeholder="Nhập tên đăng nhập">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" name="password" required placeholder="Nhập mật khẩu">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
            </button>
        </form>
        
        <div class="text-center mt-4">
            <small class="text-muted">
                Quản lý hóa đơn cho nội bộ
            </small>
        </div>
    </div>
</div>
{% endblock %}
