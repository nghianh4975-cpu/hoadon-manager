{% extends "base.html" %}
{% block title %}Doi Mat Khau{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-white"><h4 class="mb-0"><i class="bi bi-key"></i> Doi Mat Khau</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3"><label class="form-label">Mat khau cu</label><input type="password" class="form-control" name="current_password" required></div>
                    <div class="mb-3"><label class="form-label">Mat khau moi</label><input type="password" class="form-control" name="new_password" required minlength="6"></div>
                    <div class="mb-4"><label class="form-label">Xac nhan mat khau moi</label><input type="password" class="form-control" name="confirm_password" required minlength="6"></div>
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-check-circle"></i> Doi Mat Khau</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
