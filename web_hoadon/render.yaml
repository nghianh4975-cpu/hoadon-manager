services:
  - type: web
    name: hoadon-manager
    env: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    repo: https://github.com/nghianh4975-cpu/hoadon-manager
    region: singapore
